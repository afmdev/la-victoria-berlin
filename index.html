<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>La Victoria Berlin – Peruanisches Street Food Berlin</title>
  <meta name="robots" content="noindex, follow" />
  <link rel="canonical" href="https://de.lavictoriaberlin.com/" />
  <!-- Language detection: redirect to language subdomain in prod, or subfolder in dev/preview -->
  <script>
    (function () {
      var map = { de: 'de', en: 'en', es: 'es', it: 'it', fr: 'fr' };
      var lang = (navigator.language || navigator.userLanguage || 'de').slice(0, 2).toLowerCase();
      var target = map[lang] || 'de';
      var isProd = /(^|\.)lavictoriaberlin\.com$/i.test(location.hostname);
      var url = isProd
        ? 'https://' + target + '.lavictoriaberlin.com/'
        : target + '/';
      globalThis.location.replace(url);
    })();
  </script>
  <meta http-equiv="refresh" content="0;url=de/" />
</head>
<body>
  <p><a href="de/">La Victoria Berlin – Peruanisches Street Food</a></p>
</body>
</html>
